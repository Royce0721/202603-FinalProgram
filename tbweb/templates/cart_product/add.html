<!-- templates/cart_product/add.html -->

{% from 'macros.html' import form as form_macro %} {% extends "base.html" %} {%
block title %}
<title>{{ config['SITE_NAME'] }} - 添加商品到购物车</title>
{% endblock %} {% block body %}
<div class="form w-50 mx-auto my-5">
  <h5>加入购物车</h5>
  <p class="text-info">{{ product['title'] }}</p>
  {% if is_own_product %}
  <div class="alert alert-warning">这是你自己店铺的商品，不能加入购物车。</div>
  {% else %}
  {{ form_macro(form) }}
  {% endif %}
</div>
{% endblock %}
